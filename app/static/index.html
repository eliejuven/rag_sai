<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #212121;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 720px;
            line-height: 1.7;
            font-size: 15px;
        }

        .message.user {
            background: #2f2f2f;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 18px 18px 4px 18px;
            align-self: flex-end;
            max-width: 520px;
            width: fit-content;
        }

        .message.assistant {
            padding: 4px 0;
            align-self: flex-start;
        }

        .message.assistant .answer { margin-bottom: 8px; }

        .message.assistant .answer h1,
        .message.assistant .answer h2,
        .message.assistant .answer h3 {
            font-size: 15px;
            font-weight: 600;
            margin: 14px 0 6px;
            color: #fff;
        }

        .message.assistant .answer strong { color: #fff; }

        .message.assistant .answer ul,
        .message.assistant .answer ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .message.assistant .answer li {
            margin: 3px 0;
        }

        .message.assistant .answer p {
            margin: 6px 0;
        }

        sup.citation {
            font-size: 10px;
            color: #8ab4f8;
            cursor: pointer;
            margin: 0 1px;
            font-weight: 600;
            transition: color 0.15s;
        }

        sup.citation:hover {
            color: #aecbfa;
            text-decoration: underline;
        }

        .sources {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .source-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2f2f2f;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #999;
            border: 1px solid #3a3a3a;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .source-chip:hover {
            background: #3a3a3a;
            color: #ccc;
            border-color: #555;
        }

        .source-chip .chip-num {
            font-weight: 700;
            color: #8ab4f8;
            font-size: 11px;
        }

        .grounded-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .grounded-badge.yes {
            background: #1a3a2a;
            color: #6ee7b7;
            border: 1px solid #2d5a3f;
        }

        .grounded-badge.no {
            background: #3a3520;
            color: #fcd34d;
            border: 1px solid #5a4f2a;
        }

        .message.error {
            background: #3a2020;
            border: 1px solid #5a2a2a;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 720px;
            align-self: flex-start;
            font-size: 14px;
        }

        .typing-indicator {
            max-width: 720px;
            align-self: flex-start;
            color: #888;
            font-size: 14px;
            padding: 8px 0;
        }

        .progress-container {
            max-width: 720px;
            align-self: flex-start;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px 0;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
            transition: color 0.2s;
        }

        .progress-step.active {
            color: #aaa;
        }

        .progress-step.error-step {
            color: #f87171;
        }

        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #444;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .progress-step.active .progress-dot {
            background: #8ab4f8;
            animation: pulse 1s infinite;
        }

        .progress-step.done .progress-dot {
            background: #4ade80;
            animation: none;
        }

        .progress-step.error-step .progress-dot {
            background: #f87171;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .grounded-badge.cvm {
            background: #1a2a3a;
            color: #7dd3fc;
            border: 1px solid #2d4a5a;
        }

        .ref-panel {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 600px;
            width: 90%;
            background: #2f2f2f;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 100;
            max-height: 240px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
            display: none;
        }

        .ref-panel .ref-header {
            font-size: 11px;
            font-weight: 600;
            color: #8ab4f8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .ref-panel .ref-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
        }

        .ref-panel .ref-close:hover { color: #fff; }

        .ref-panel .ref-content {
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #ccc;
            line-height: 1.6;
        }

        .ref-panel .ref-meta {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #3a3a3a;
        }

        .input-bar {
            background: #2f2f2f;
            border-top: 1px solid #3a3a3a;
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #383838;
            border-radius: 24px;
            padding: 4px 8px;
            border: 1px solid #444;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: #666; }

        .attach-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            transition: color 0.2s, background 0.2s;
            position: relative;
        }

        .attach-btn:hover { color: #fff; background: #4a4a4a; }
        .attach-btn:disabled { color: #555; cursor: not-allowed; }

        .attach-btn svg { width: 20px; height: 20px; }

        .attach-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #8ab4f8;
            color: #1a1a1a;
            font-size: 9px;
            font-weight: 700;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-wrapper input {
            flex: 1;
            padding: 8px 4px;
            border: none;
            background: transparent;
            font-size: 14px;
            color: #e0e0e0;
            outline: none;
        }

        .input-wrapper input::placeholder { color: #777; }

        .send-btn {
            background: #fff;
            color: #1a1a1a;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .send-btn svg { width: 16px; height: 16px; }

        #file-input { display: none; }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            gap: 8px;
            text-align: center;
            padding: 40px;
        }

        .empty-state h2 {
            font-size: 22px;
            font-weight: 500;
            color: #aaa;
        }

        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>
    <div class="chat-container" id="chat">
        <div class="empty-state" id="empty-state">
            <h2>Document Q&A</h2>
            <p>Attach PDFs with the paperclip, then ask questions about their content.</p>
        </div>
    </div>

    <div class="ref-panel" id="ref-panel">
        <button class="ref-close" onclick="closeRefPanel()">&times;</button>
        <div class="ref-header" id="ref-header"></div>
        <div id="ref-body"></div>
    </div>

    <div class="input-bar">
        <div class="input-wrapper">
            <button class="attach-btn" id="attach-btn" onclick="document.getElementById('file-input').click()" title="Upload PDFs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <input type="file" id="file-input" multiple accept=".pdf">
            <input type="text" id="question-input" placeholder="Ask a question..." autofocus>
            <button class="send-btn" id="send-btn" onclick="sendQuestion()" title="Send">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const emptyState = document.getElementById("empty-state");
        const questionInput = document.getElementById("question-input");
        const sendBtn = document.getElementById("send-btn");
        const fileInput = document.getElementById("file-input");
        const attachBtn = document.getElementById("attach-btn");
        const refPanel = document.getElementById("ref-panel");
        const refHeader = document.getElementById("ref-header");
        const refBody = document.getElementById("ref-body");

        let totalDocs = 0;
        let lastChunks = [];

        fileInput.addEventListener("change", handleUpload);
        questionInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !sendBtn.disabled) sendQuestion();
        });
        document.addEventListener("click", (e) => {
            if (
                !refPanel.contains(e.target) &&
                !e.target.classList.contains("citation") &&
                !e.target.closest(".source-chip")
            ) {
                closeRefPanel();
            }
        });

        async function handleUpload() {
            const files = fileInput.files;
            if (!files.length) return;

            attachBtn.disabled = true;

            const formData = new FormData();
            for (const file of files) {
                formData.append("files", file);
            }

            try {
                const res = await fetch("/ingest", { method: "POST", body: formData });
                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail || "Upload failed");
                    return;
                }

                totalDocs += data.document_ids.length;
                updateAttachBadge();
            } catch (err) {
                alert("Upload failed");
            } finally {
                attachBtn.disabled = false;
                fileInput.value = "";
            }
        }

        function updateAttachBadge() {
            const existing = attachBtn.querySelector(".attach-badge");
            if (existing) existing.remove();
            if (totalDocs > 0) {
                const badge = document.createElement("span");
                badge.className = "attach-badge";
                badge.textContent = totalDocs;
                attachBtn.appendChild(badge);
            }
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            emptyState?.remove();
            appendMessage("user", question);
            questionInput.value = "";
            sendBtn.disabled = true;

            // Create a live progress container in the chat
            const progressContainer = document.createElement("div");
            progressContainer.className = "progress-container";
            chat.appendChild(progressContainer);
            chat.scrollTop = chat.scrollHeight;

            let lastStep = null;

            function addProgressStep(message, isError = false) {
                // Mark previous step as done
                if (lastStep) {
                    lastStep.classList.remove("active");
                    if (!lastStep.classList.contains("error-step")) {
                        lastStep.classList.add("done");
                    }
                }
                const step = document.createElement("div");
                step.className = `progress-step ${isError ? "error-step" : "active"}`;
                step.innerHTML = `<span class="progress-dot"></span><span>${escapeHtml(message)}</span>`;
                progressContainer.appendChild(step);
                lastStep = step;
                chat.scrollTop = chat.scrollHeight;
            }

            try {
                const res = await fetch("/query/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    progressContainer.remove();
                    appendMessage("error", data.detail || "Something went wrong.");
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split("\n\n");
                    buffer = parts.pop(); // keep incomplete chunk

                    for (const part of parts) {
                        const line = part.trim();
                        if (!line.startsWith("data:")) continue;
                        let event;
                        try { event = JSON.parse(line.slice(5).trim()); }
                        catch { continue; }

                        if (event.type === "progress") {
                            const isError = event.message.startsWith("ERRO:");
                            addProgressStep(event.message, isError);

                        } else if (event.type === "answer") {
                            // Mark last step done, then replace progress with answer
                            if (lastStep) {
                                lastStep.classList.remove("active");
                                lastStep.classList.add("done");
                            }
                            progressContainer.remove();
                            appendAssistantMessage(event.answer, event.chunks, event.grounded);

                        } else if (event.type === "error") {
                            addProgressStep(`Erro: ${event.message}`, true);
                        }
                    }
                }
            } catch (err) {
                progressContainer.remove();
                appendMessage("error", "Failed to connect to the server.");
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }

        function appendMessage(type, text) {
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function appendAssistantMessage(answer, chunks, grounded) {
            lastChunks = chunks || [];

            const div = document.createElement("div");
            div.className = "message assistant";

            let html = "";

            if (grounded) {
                const isCvm = (chunks || []).some(c => c.filename && c.filename.includes("(CVM)"));
                if (isCvm) {
                    html += `<span class="grounded-badge cvm">Grounded in CVM data</span>`;
                } else {
                    html += `<span class="grounded-badge yes">Grounded in documents</span>`;
                }
            } else if (chunks !== undefined) {
                html += `<span class="grounded-badge no">General knowledge</span>`;
            }

            html += `<div class="answer">${formatAnswer(answer, chunks)}</div>`;

            if (chunks && chunks.length > 0) {
                html += `<div class="sources">`;
                chunks.forEach((c, i) => {
                    html += `<span class="source-chip" onclick="showRef(${i})">
                        <span class="chip-num">[${i + 1}]</span>
                        ${escapeHtml(c.filename)} — p.${c.page_number}
                    </span>`;
                });
                html += `</div>`;
            }

            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function formatAnswer(text, chunks) {
            let html = escapeHtml(text);

            html = html.replace(/\[(\d+)\]/g, (match, num) => {
                const idx = parseInt(num) - 1;
                if (chunks && idx >= 0 && idx < chunks.length) {
                    return `<sup class="citation" onclick="showRef(${idx})">${num}</sup>`;
                }
                return match;
            });

            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            const lines = html.split('\n');
            let result = [];
            let inList = false;

            for (const line of lines) {
                const listMatch = line.match(/^[-*] (.+)/);
                if (listMatch) {
                    if (!inList) { result.push('<ul>'); inList = true; }
                    result.push(`<li>${listMatch[1]}</li>`);
                } else {
                    if (inList) { result.push('</ul>'); inList = false; }
                    if (line.trim() === '') {
                        result.push('<br>');
                    } else if (!line.startsWith('<h')) {
                        result.push(`<p>${line}</p>`);
                    } else {
                        result.push(line);
                    }
                }
            }
            if (inList) result.push('</ul>');

            return result.join('');
        }

        function showRef(index) {
            const chunk = lastChunks[index];
            if (!chunk) return;

            refHeader.textContent = `[${index + 1}] ${chunk.filename} — page ${chunk.page_number}`;
            refBody.innerHTML = `
                <div class="ref-content">${escapeHtml(chunk.text)}</div>
                <div class="ref-meta">Relevance score: ${chunk.score} &nbsp;·&nbsp; ${chunk.filename}</div>
            `;
            refPanel.style.display = "block";
        }

        function closeRefPanel() {
            refPanel.style.display = "none";
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }
    </script>
</body>
</html>
